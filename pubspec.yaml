name: lifelink
description: "Heal Chain — A production-ready blood donation mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.17

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  # Auth
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^4.0.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking & AI
  http: ^1.3.0
  google_generative_ai: ^0.4.6

  # Utilities
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  permission_handler: ^11.4.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#080C1E"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
